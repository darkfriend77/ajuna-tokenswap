<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajuna Tokenswap - Test UI</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 30px;
        margin-bottom: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 2.5em;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        font-size: 1.1em;
      }

      .status-bar {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }

      .status-item:last-child {
        border-bottom: none;
      }

      .status-label {
        font-weight: 600;
        color: #555;
      }

      .status-value {
        font-family: "Monaco", "Courier New", monospace;
        color: #667eea;
        font-size: 0.9em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
      }

      .card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }

      .card-title {
        font-size: 1.4em;
        font-weight: 700;
        margin-bottom: 15px;
        color: #333;
      }

      .balance-display {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 15px;
        text-align: center;
      }

      .balance-label {
        font-size: 0.9em;
        opacity: 0.9;
        margin-bottom: 5px;
      }

      .balance-value {
        font-size: 2em;
        font-weight: 700;
      }

      .input-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
      }

      input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1em;
        transition: border-color 0.3s ease;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        margin-top: 10px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }

      .btn-success {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      }

      .log-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        max-height: 400px;
        overflow-y: auto;
      }

      .log-entry {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        font-family: "Monaco", "Courier New", monospace;
        font-size: 0.85em;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .log-info {
        background: #e3f2fd;
        border-left: 4px solid #2196f3;
      }

      .log-success {
        background: #e8f5e9;
        border-left: 4px solid #4caf50;
      }

      .log-error {
        background: #ffebee;
        border-left: 4px solid #f44336;
      }

      .log-warning {
        background: #fff3e0;
        border-left: 4px solid #ff9800;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .address-display {
        font-family: "Monaco", "Courier New", monospace;
        font-size: 0.85em;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🎮 Ajuna Tokenswap Test UI</h1>
        <p class="subtitle">Visual testing interface for local PVM node</p>
      </div>

      <div class="status-bar">
        <div class="status-item">
          <span class="status-label">Network:</span>
          <span class="status-value" id="network">Connecting...</span>
        </div>
        <div class="status-item">
          <span class="status-label">Your Address:</span>
          <span class="status-value address-display" id="address">-</span>
        </div>
        <div class="status-item">
          <span class="status-label">Native Balance:</span>
          <span class="status-value" id="nativeBalance">0 DEV</span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h2 class="card-title">💰 Setup</h2>
          <button onclick="fundAccount()" class="btn-success">
            Fund Test Account (100 DEV)
          </button>
          <button onclick="deployContracts()" class="btn-secondary">
            Deploy Contracts
          </button>
          <div class="input-group" style="margin-top: 20px">
            <label>Wrapper Address:</label>
            <input type="text" id="wrapperAddress" placeholder="0x..." />
          </div>
          <div class="input-group">
            <label>ERC20 Address:</label>
            <input type="text" id="erc20Address" placeholder="0x..." />
          </div>
          <button onclick="loadContracts()">Load Contracts</button>
        </div>

        <div class="card">
          <h2 class="card-title">📊 Balances</h2>
          <div class="balance-display">
            <div class="balance-label">Foreign Asset Balance</div>
            <div class="balance-value" id="foreignBalance">0</div>
          </div>
          <div
            class="balance-display"
            style="
              background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            "
          >
            <div class="balance-label">Wrapped ERC20 Balance</div>
            <div class="balance-value" id="erc20Balance">0</div>
          </div>
          <button onclick="refreshBalances()">🔄 Refresh Balances</button>
        </div>

        <div class="card">
          <h2 class="card-title">📥 Wrap (Deposit)</h2>
          <div class="input-group">
            <label>Amount to Wrap:</label>
            <input
              type="number"
              id="wrapAmount"
              placeholder="100"
              value="100"
            />
          </div>
          <button onclick="approveWrap()">1. Approve Foreign Asset</button>
          <button onclick="wrap()">2. Wrap (Lock & Mint)</button>
        </div>

        <div class="card">
          <h2 class="card-title">📤 Unwrap (Withdraw)</h2>
          <div class="input-group">
            <label>Amount to Unwrap:</label>
            <input
              type="number"
              id="unwrapAmount"
              placeholder="50"
              value="50"
            />
          </div>
          <button onclick="approveUnwrap()">1. Approve ERC20</button>
          <button onclick="unwrap()">2. Unwrap (Burn & Withdraw)</button>
        </div>
      </div>

      <div class="log-container">
        <h2 class="card-title">📝 Activity Log</h2>
        <div id="logs"></div>
      </div>
    </div>

    <script>
      // Configuration
      const RPC_URL = "http://127.0.0.1:8545";
      const CHAIN_ID = 420420420;
      const TEST_ACCOUNT_KEY =
        "0x99b3c12287537e38c90a9219d4cb074a89a16e9cdb20bf85728ebd97c343e342";
      const ALICE_KEY =
        "0xe5be9a5092b81bca64be81d212e7f2f9eba183bb7a90954f7b76361f6edb5c0a";
      const FOREIGN_ASSET_ADDRESS =
        "0x0000000000000000000000000000000000000400";

      // Global state
      let provider, signer, address;
      let wrapperContract, erc20Contract, foreignAssetContract;

      // Contract ABIs
      const ERC20_ABI = [
        "function balanceOf(address) view returns (uint256)",
        "function approve(address spender, uint256 amount) returns (bool)",
        "function allowance(address owner, address spender) view returns (uint256)",
        "event Transfer(address indexed from, address indexed to, uint256 value)",
        "event Approval(address indexed owner, address indexed spender, uint256 value)",
      ];

      const WRAPPER_ABI = [
        "function wrap(uint256 amount)",
        "function unwrap(uint256 amount)",
        "function erc20Token() view returns (address)",
        "event Wrapped(address indexed user, uint256 amount)",
        "event Unwrapped(address indexed user, uint256 amount)",
      ];

      // Initialize
      async function init() {
        try {
          provider = new ethers.providers.JsonRpcProvider(RPC_URL);
          signer = new ethers.Wallet(TEST_ACCOUNT_KEY, provider);
          address = signer.address;

          document.getElementById("address").textContent = address;

          const network = await provider.getNetwork();
          document.getElementById(
            "network",
          ).textContent = `Local (Chain ID: ${network.chainId})`;

          await updateNativeBalance();
          log("Connected to local node", "success");
        } catch (error) {
          log(`Connection error: ${error.message}`, "error");
        }
      }

      // Logging
      function log(message, type = "info") {
        const logsDiv = document.getElementById("logs");
        const entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logsDiv.insertBefore(entry, logsDiv.firstChild);
      }

      // Update native balance
      async function updateNativeBalance() {
        try {
          const balance = await provider.getBalance(address);
          document.getElementById(
            "nativeBalance",
          ).textContent = `${ethers.utils.formatEther(balance)} DEV`;
        } catch (error) {
          log(`Error fetching balance: ${error.message}`, "error");
        }
      }

      // Fund account from Alice
      async function fundAccount() {
        try {
          log("Funding account from Alice...", "info");
          const alice = new ethers.Wallet(ALICE_KEY, provider);

          const tx = await alice.sendTransaction({
            to: address,
            value: ethers.utils.parseEther("100"),
            gasPrice: 50000000000,
            gasLimit: 21000,
          });

          log(`Transaction sent: ${tx.hash}`, "info");
          await tx.wait();
          log("Account funded successfully! ✅", "success");
          await updateNativeBalance();
        } catch (error) {
          log(`Funding failed: ${error.message}`, "error");
        }
      }

      // Deploy contracts
      async function deployContracts() {
        try {
          log("Deploying contracts...", "info");

          // This would require the contract bytecode
          // For now, show instructions
          log(
            "Please deploy using: npx hardhat ignition deploy ./ignition/modules/AjunaWrapper.ts --network local",
            "warning",
          );
          log(
            'Then paste the addresses above and click "Load Contracts"',
            "info",
          );
        } catch (error) {
          log(`Deployment error: ${error.message}`, "error");
        }
      }

      // Load contracts
      async function loadContracts() {
        try {
          const wrapperAddr = document.getElementById("wrapperAddress").value;
          const erc20Addr = document.getElementById("erc20Address").value;

          if (!wrapperAddr || !erc20Addr) {
            log("Please enter both contract addresses", "error");
            return;
          }

          wrapperContract = new ethers.Contract(
            wrapperAddr,
            WRAPPER_ABI,
            signer,
          );
          erc20Contract = new ethers.Contract(erc20Addr, ERC20_ABI, signer);
          foreignAssetContract = new ethers.Contract(
            FOREIGN_ASSET_ADDRESS,
            ERC20_ABI,
            signer,
          );

          log("Contracts loaded successfully! ✅", "success");
          await refreshBalances();
        } catch (error) {
          log(`Error loading contracts: ${error.message}`, "error");
        }
      }

      // Refresh balances
      async function refreshBalances() {
        if (!foreignAssetContract || !erc20Contract) {
          log("Please load contracts first", "warning");
          return;
        }

        try {
          const foreignBal = await foreignAssetContract.balanceOf(address);
          const erc20Bal = await erc20Contract.balanceOf(address);

          document.getElementById("foreignBalance").textContent =
            ethers.utils.formatEther(foreignBal);
          document.getElementById("erc20Balance").textContent =
            ethers.utils.formatEther(erc20Bal);

          log("Balances refreshed", "info");
        } catch (error) {
          log(`Error refreshing balances: ${error.message}`, "error");
        }
      }

      // Approve wrap
      async function approveWrap() {
        if (!foreignAssetContract || !wrapperContract) {
          log("Please load contracts first", "warning");
          return;
        }

        try {
          const amount = document.getElementById("wrapAmount").value;
          const amountWei = ethers.utils.parseEther(amount);

          log(`Approving ${amount} Foreign Assets...`, "info");
          const tx = await foreignAssetContract.approve(
            wrapperContract.address,
            amountWei,
          );
          await tx.wait();
          log("Approval successful! ✅", "success");
        } catch (error) {
          log(`Approval failed: ${error.message}`, "error");
        }
      }

      // Wrap
      async function wrap() {
        if (!wrapperContract) {
          log("Please load contracts first", "warning");
          return;
        }

        try {
          const amount = document.getElementById("wrapAmount").value;
          const amountWei = ethers.utils.parseEther(amount);

          log(`Wrapping ${amount} tokens...`, "info");
          const tx = await wrapperContract.wrap(amountWei);
          await tx.wait();
          log("Wrap successful! ✅", "success");
          await refreshBalances();
        } catch (error) {
          log(`Wrap failed: ${error.message}`, "error");
        }
      }

      // Approve unwrap
      async function approveUnwrap() {
        if (!erc20Contract || !wrapperContract) {
          log("Please load contracts first", "warning");
          return;
        }

        try {
          const amount = document.getElementById("unwrapAmount").value;
          const amountWei = ethers.utils.parseEther(amount);

          log(`Approving ${amount} ERC20 tokens...`, "info");
          const tx = await erc20Contract.approve(
            wrapperContract.address,
            amountWei,
          );
          await tx.wait();
          log("Approval successful! ✅", "success");
        } catch (error) {
          log(`Approval failed: ${error.message}`, "error");
        }
      }

      // Unwrap
      async function unwrap() {
        if (!wrapperContract) {
          log("Please load contracts first", "warning");
          return;
        }

        try {
          const amount = document.getElementById("unwrapAmount").value;
          const amountWei = ethers.utils.parseEther(amount);

          log(`Unwrapping ${amount} tokens...`, "info");
          const tx = await wrapperContract.unwrap(amountWei);
          await tx.wait();
          log("Unwrap successful! ✅", "success");
          await refreshBalances();
        } catch (error) {
          log(`Unwrap failed: ${error.message}`, "error");
        }
      }

      // Initialize on load
      window.addEventListener("load", init);
    </script>
  </body>
</html>
